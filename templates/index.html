<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRO Style | الرئيسية</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo">FIRO Style</div>
        <nav>
            <a href="/" class="active">الرئيسية</a>
            <a href="/shop">المتجر</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>أهلاً بك في عالم المكرمية</h1>
            <p>قطع يدوية صنعت بكل حب لتضيف لمسة جمالية لمنزلك</p>
            <div class="hero-buttons">
                <a href="/shop" class="btn-primary">تصفح المتجر</a>
            </div>
        </div>
    </section>

    <main class="container">
        <section class="featured-product">
            <div class="product-container">
                <div class="product-images">
                    <img src="{{ url_for('static', filename='images/' + product.images[0]) }}" alt="منتج مميز">
                </div>
                
                <div class="product-details">
                    <span class="badge">الأكثر مبيعاً</span>
                    <h1>{{ product.name }}</h1>
                    <p class="price">{{ product.price }} جنيه</p>
                    <div class="description">
                        <p>{{ product.desc }}</p>
                    </div>
                    <a href="https://wa.me/{{ product.whatsapp }}?text=أريد طلب: {{ product.name }}" class="whatsapp-btn">
                        <i class="fab fa-whatsapp"></i> اطلب الآن عبر واتساب
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة © 2026 | FIRO Style</p>
    </footer>

</body>
</html>
